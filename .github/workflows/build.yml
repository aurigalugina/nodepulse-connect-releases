name: Build & Publish NodePulse Connect

on:
  push:
    tags:
      - 'v*'      # e.g. v0.3.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.3.0) — defaults to tag'
        required: false

jobs:
  # ── Build per platform ─────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target:   windows-x86_64
            bundle_dir: nsis
            ext:      exe

          - platform: macos-latest      # Apple Silicon (Intel Mac supported via Rosetta 2)
            target:   darwin-aarch64
            bundle_dir: dmg
            ext:      dmg

          - platform: ubuntu-22.04
            target:   linux-x86_64
            bundle_dir: appimage
            ext:      AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      # Windows: build Tailscale from source with SDDL patch.
      # Root cause of ERROR_INVALID_OWNER: Tailscale's windowsSDDL = "O:BAG:BAD:PAI..."
      # sets Owner=BUILTIN\Administrators on the named pipe, which requires admin rights.
      # Fix: remove "O:BA" and "G:BA" — without an explicit owner, Windows assigns the
      # current process user automatically (always valid, no admin needed).
      - name: Bundle Tailscale binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git clone --depth 1 --branch v1.98.2 https://github.com/tailscale/tailscale tailscale-src

          # Patch 1: SDDL — remove O:BA owner so non-admin users can create named pipe
          $file = "tailscale-src\safesocket\pipe_windows.go"
          (Get-Content $file -Raw) -replace '"O:BAG:BAD:PAI', '"D:PAI' | Set-Content $file

          # Patch 2: redirect ProgramData → LocalAppData across ALL Go source files.
          # tailscaled v1.98.2 constructs the audit-log path in multiple files
          # (paths_windows.go, cmd/tailscaled audit init, etc.) — patching only one
          # file leaves other references intact and still hits C:\ProgramData\Tailscale\
          # which is inaccessible to non-admin users when system Tailscale is installed.
          $patched = 0
          Get-ChildItem tailscale-src -Recurse -Filter "*.go" | ForEach-Object {
            $src = Get-Content $_.FullName -Raw
            if ($src -match 'PROGRAMDATA|FOLDERID_ProgramData') {
              $new = $src `
                -replace 'os\.Getenv\("PROGRAMDATA"\)', 'os.Getenv("LOCALAPPDATA")' `
                -replace 'windows\.FOLDERID_ProgramData', 'windows.FOLDERID_LocalAppData'
              if ($new -ne $src) {
                Set-Content $_.FullName $new
                Write-Host "Patched $($_.FullName): ProgramData -> LocalAppData"
                $patched++
              }
            }
          }
          Write-Host "Total files patched: $patched"

          # Patch 3: Force serverMode=true in LocalBackend.Start().
          #
          # Root cause of all NodePulse Connect connection failures: in non-server mode,
          # when the `tailscale up` CLI exits (~4s after prefs are sent), the daemon calls
          # b.Start(serverMode=false), which resets WantRunning=false and cancels any
          # in-progress doLogin. BackendState stays at NoState indefinitely.
          #
          # System Tailscale works because it runs as a Windows Service (serverMode=true).
          # With serverMode=true: client disconnects do NOT reset WantRunning. doLogin runs
          # to completion after tailscale up exits, transitions to Running state.
          #
          # Fix: in v1.98.2, the variable is 'inServerMode := prefs.ForceDaemon()'.
          # ForceDaemon() returns false (user hasn't set it), so inServerMode=false even
          # though 'runtime.GOOS == "windows"' makes the block always execute on Windows.
          # With inServerMode=false, WantRunning is still reset to false on CLI disconnect.
          # Force inServerMode := true so doLogin runs to completion after tailscale up exits.
          # Safe for our isolated daemon — we control lifecycle directly (kill on app exit).
          $ipnlocal = "tailscale-src\ipn\ipnlocal\local.go"
          if (-not (Test-Path $ipnlocal)) {
            Write-Error "ipnlocal/local.go not found — check Tailscale source layout"; exit 1
          }
          $src = [System.IO.File]::ReadAllText($ipnlocal)
          $patch3_applied = $false

          # Strategy A: target 'inServerMode := prefs.ForceDaemon()' — the exact pattern
          # in v1.98.2. Force it to true so WantRunning is NOT reset on CLI disconnect.
          $new = $src -replace 'inServerMode\s*:=\s*prefs\.ForceDaemon\(\)', 'inServerMode := true /* NodePulse patch 3: force server mode */'
          if ($new -ne $src) {
            [System.IO.File]::WriteAllText($ipnlocal, $new)
            Write-Host "Patch 3 applied (strategy A): inServerMode := prefs.ForceDaemon() -> true"
            $patch3_applied = $true
          }

          # Strategy B: broader — any 'inServerMode := <non-true expr>' declaration
          if (-not $patch3_applied) {
            $replB = '${1}true /* NodePulse patch 3: force server mode */'
            $new = $src -replace '(?m)([ \t]*if\s+inServerMode\s*:=\s*)(?!true\b)[^;]+', $replB
            if ($new -ne $src) {
              [System.IO.File]::WriteAllText($ipnlocal, $new)
              Write-Host "Patch 3 applied (strategy B): inServerMode := <expr> -> true"
              $patch3_applied = $true
            }
          }

          if (-not $patch3_applied) {
            # Check if v1.98.2+ already has 'runtime.GOOS == "windows"' in the serverMode
            # condition — which hardcodes server mode = true for all Windows builds.
            # In that case, Patch 3 is a no-op and we can safely skip it.
            $hasWindowsHardcode = $src -match 'inServerMode\s*\|\|\s*runtime\.GOOS\s*==\s*"windows"'
            if ($hasWindowsHardcode) {
              Write-Host "Patch 3 SKIPPED: v1.98.2 already has 'runtime.GOOS == windows' hardcode — server mode is always true on Windows builds. No patch needed."
            } else {
              Write-Host "=== Patch 3 FAILED — diagnostics ==="
              $src.Split("`n") | Where-Object { $_ -match 'serverMode|ServerMode' } | ForEach-Object { Write-Host "  $_" }
              $src.Split("`n") | Where-Object { $_ -match 'func.*Start' } | ForEach-Object { Write-Host "  $_" }
              Write-Error "Patch 3 failed and no Windows hardcode found — manual investigation required"; exit 1
            }
          }

          # Patch 4: Fix "profile data directory: profile not found"
          #
          # Root cause: when b.Start() is called after the tailscale CLI disconnects,
          # the profile manager looks for a profile data directory on the filesystem.
          # This directory is only created after doLogin COMPLETES (i.e. after the node
          # receives a node map from Headscale). But our CLI exits in ~3s (pre-auth key
          # flow exits immediately), before doLogin finishes. So the directory doesn't
          # exist yet, the profile manager falls back to empty prefs (WantRunning=false),
          # and control.Shutdown() is called — canceling the in-progress doLogin.
          #
          # Fix: find the code that logs "profile data directory: profile not found"
          # and patch it to create the directory with os.MkdirAll instead of failing.
          # This lets the profile manager load prefs from the state store (WantRunning=true)
          # rather than falling back to empty defaults.
          $patch4_applied = $false
          # NOTE: source uses logf("profile data directory: %v", err) — the "%v" is the
          # format string, NOT the literal "profile not found". Search for the format string.
          $profileMsg = 'profile data directory: %v'
          $patch4File = $null

          Get-ChildItem tailscale-src -Recurse -Filter "*.go" | ForEach-Object {
            if ($null -eq $patch4File) {
              $c = [System.IO.File]::ReadAllText($_.FullName)
              if ($c -match [regex]::Escape($profileMsg)) { $patch4File = $_.FullName }
            }
          }

          if ($null -eq $patch4File) {
            Write-Host "Patch 4: message not found in source — skipping"
          } else {
            Write-Host "Patch 4: found in $patch4File"
            $src4 = [System.IO.File]::ReadAllText($patch4File)

            # Always dump context for diagnostics
            $lines4 = $src4.Split("`n")
            for ($i = 0; $i -lt $lines4.Count; $i++) {
              if ($lines4[$i] -match [regex]::Escape($profileMsg)) {
                $s = [Math]::Max(0, $i-12); $e = [Math]::Min($lines4.Count-1, $i+5)
                Write-Host "=== Patch 4 context (lines $($s+1)-$($e+1)) ==="
                for ($j = $s; $j -le $e; $j++) { Write-Host "  $($j+1): $($lines4[$j])" }
              }
            }

            # Strategy A: line-by-line scan.
            # For each line containing os.Stat(<var>), look ahead ≤10 lines for our log message.
            # If found, insert os.MkdirAll(<var>, 0o700) before the stat line so the
            # directory always exists when the stat check runs — making it succeed instead
            # of falling back to empty prefs (WantRunning=false).
            $lines4 = $src4.Split("`n")
            $out4   = [System.Collections.Generic.List[string]]::new()
            for ($i = 0; $i -lt $lines4.Count; $i++) {
              if ($lines4[$i] -match 'os\.Stat\((\w+)\)') {
                $dirVar = $Matches[1]
                $lookahead = $false
                for ($j = $i+1; $j -le [Math]::Min($i+10, $lines4.Count-1); $j++) {
                  if ($lines4[$j] -match [regex]::Escape($profileMsg)) { $lookahead = $true; break }
                }
                if ($lookahead) {
                  $indent = if ($lines4[$i] -match '^([ \t]+)') { $Matches[1] } else { "`t" }
                  $out4.Add("${indent}os.MkdirAll(${dirVar}, 0o700) /* NodePulse patch 4: create profile dir so stat succeeds */")
                  Write-Host "Patch 4 strategy A: inserted MkdirAll($dirVar) before line $($i+1)"
                  $patch4_applied = $true
                }
              }
              $out4.Add($lines4[$i])
            }
            if ($patch4_applied) {
              [System.IO.File]::WriteAllText($patch4File, ($out4 -join "`n"))
              Write-Host "Patch 4 applied (strategy A)"
            }

            if (-not $patch4_applied) {
              Write-Host "Patch 4: strategy A did not match — inspect context above and add targeted strategy."
              Write-Error "Patch 4 failed — profile-not-found code must be fixed"; exit 1
            }
          }

          # Patch 5: Preserve WantRunning=true in server mode on IPN client disconnect.
          #
          # Root cause of remaining failure: when `tailscale up` exits, the IPN server
          # calls b.Start(opts) where opts.WantRunning=false (empty opts from disconnect
          # handler). Even with inServerMode=true (Patch 3), the code still applies
          # opts.WantRunning=false to prefs, causing control.Shutdown() and NeedsLogin.
          #
          # Fix: inside the inServerMode block (already patched by Patch 3), AFTER the
          # existing logf("serverMode=%v"...) line, inject code that overrides
          # opts.WantRunning=true when serverMode is active and current prefs have
          # WantRunning=true. This prevents the IPN server's disconnect cleanup from
          # stopping the daemon's in-progress doLogin.
          $patch5_applied = $false
          $ipnlocal5 = "tailscale-src\ipn\ipnlocal\local.go"
          if (-not (Test-Path $ipnlocal5)) {
            Write-Host "Patch 5: local.go not found — skipping"
          } else {
            $src5 = [System.IO.File]::ReadAllText($ipnlocal5)

            # Dump WantRunning-related lines for diagnostics
            Write-Host "=== Patch 5: WantRunning+opts lines in local.go ==="
            $src5.Split("`n") | Where-Object { $_ -match 'WantRunning' -and $_ -match 'opts' } | Select-Object -First 20 | ForEach-Object { Write-Host "  $_" }
            Write-Host "=== Patch 5: WantRunning assignment lines ==="
            $src5.Split("`n") | Where-Object { $_ -match 'WantRunning\s*=' -and $_ -notmatch '==' -and $_ -notmatch '//' } | Select-Object -First 20 | ForEach-Object { Write-Host "  $_" }

            # Strategy A: insert WantRunning override inside the existing inServerMode block,
            # right after the logf("serverMode=%v", inServerMode) line we know exists.
            # This uses the anchor from our Patch 3 comment to reliably find the location.
            $anchor = 'logf("serverMode=%v", inServerMode)'
            if ($src5 -match [regex]::Escape($anchor)) {
              $insert = "`n`t`tif inServerMode && !opts.WantRunning {`n`t`t`t// NodePulse patch 5: preserve WantRunning in server mode — IPN server sends`n`t`t`t// opts.WantRunning=false on client disconnect; we override to keep daemon running.`n`t`t`topts.WantRunning = b.pm.CurrentPrefs().WantRunning()`n`t`t}"
              $new5 = $src5.Replace($anchor, $anchor + $insert)
              if ($new5 -ne $src5) {
                [System.IO.File]::WriteAllText($ipnlocal5, $new5)
                Write-Host "Patch 5 applied (strategy A): WantRunning override inserted after serverMode logf"
                $patch5_applied = $true
              }
            }

            if (-not $patch5_applied) {
              Write-Host "Patch 5: anchor not found — see WantRunning diagnostics above"
              Write-Error "Patch 5 failed — WantRunning reset must be fixed"; exit 1
            }
          }

          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Push-Location tailscale-src
          go build -o "..\src-tauri\binaries\tailscaled-x86_64-pc-windows-msvc.exe" .\cmd\tailscaled
          if ($LASTEXITCODE -ne 0) { Write-Error "go build tailscaled failed (exit $LASTEXITCODE)"; exit 1 }
          go build -o "..\src-tauri\binaries\tailscale-x86_64-pc-windows-msvc.exe" .\cmd\tailscale
          if ($LASTEXITCODE -ne 0) { Write-Error "go build tailscale failed (exit $LASTEXITCODE)"; exit 1 }
          Pop-Location
          Remove-Item tailscale-src -Recurse -Force

          # Verify binaries exist before Tauri build
          if (-not (Test-Path "src-tauri\binaries\tailscaled-x86_64-pc-windows-msvc.exe")) {
            Write-Error "tailscaled binary not found after build — aborting"; exit 1
          }
          if (-not (Test-Path "src-tauri\binaries\tailscale-x86_64-pc-windows-msvc.exe")) {
            Write-Error "tailscale binary not found after build — aborting"; exit 1
          }
          Write-Host "Binaries verified OK"

      # macOS: install Tailscale via Homebrew, copy binaries into src-tauri/binaries/
      - name: Bundle Tailscale binaries (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install tailscale 2>/dev/null || brew upgrade tailscale 2>/dev/null || true
          mkdir -p src-tauri/binaries
          cp "$(brew --prefix tailscale)/bin/tailscale"  src-tauri/binaries/tailscale-aarch64-apple-darwin
          cp "$(brew --prefix tailscale)/bin/tailscaled" src-tauri/binaries/tailscaled-aarch64-apple-darwin
          chmod +x src-tauri/binaries/tailscale-aarch64-apple-darwin
          chmod +x src-tauri/binaries/tailscaled-aarch64-apple-darwin

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Windows/macOS: merge externalBin sidecar config so bundled binaries are included.
        # Linux: no externalBin — Tailscale is downloaded by the app at first launch.
        run: |
          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            npm run tauri build
          else
            npm run tauri build -- -c src-tauri/tauri-sidecar-extra.json
          fi
        shell: bash

      # macOS: also create .app.tar.gz + sign it (Tauri v2 updater artifact for macOS)
      - name: Create macOS updater artifact
        if: matrix.platform == 'macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name "*.app" | head -1)
          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          TARBALL="${APP_DIR}/${APP_NAME}.tar.gz"
          tar -czf "$TARBALL" -C "$APP_DIR" "$APP_NAME"
          npx @tauri-apps/cli signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$TARBALL"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/${{ matrix.bundle_dir }}/*.${{ matrix.ext }}
            src-tauri/target/release/bundle/${{ matrix.bundle_dir }}/*.${{ matrix.ext }}.sig
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

  # ── Publish: assemble latest.json + create GitHub Release ──────────────────────
  publish:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          # Always read from tauri.conf.json — this is the canonical version baked into the binary.
          # workflow_dispatch version input and tag names are ignored to prevent latest.json
          # from reporting a version that doesn't match the installed binary (causes update loops).
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: bundle-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: find bundles -type f | sort

      - name: Assemble latest.json
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BASE_URL: https://github.com/aurigalugina/nodepulse-connect-releases/releases/download/v${{ steps.ver.outputs.version }}
        run: |
          read_sig() { cat "$1" 2>/dev/null || echo ""; }

          WIN_EXE=$(find bundles/bundle-windows-x86_64 -name "*.exe"        | head -1)
          MAC_TAR=$(find bundles/bundle-darwin-aarch64 -name "*.app.tar.gz" | head -1)
          MAC_DMG=$(find bundles/bundle-darwin-aarch64 -name "*.dmg"        | head -1)
          LNX_IMG=$(find bundles/bundle-linux-x86_64  -name "*.AppImage"    | head -1)

          WIN_SIG=$(read_sig "${WIN_EXE}.sig")
          MAC_SIG=$(read_sig "${MAC_TAR}.sig")
          LNX_SIG=$(read_sig "${LNX_IMG}.sig")

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          python3 - <<PYEOF
          import json, os

          base    = os.environ['BASE_URL']
          version = os.environ['VERSION']

          def url(fname):
            # GitHub Releases normalizes spaces to dots in asset download URLs
            return f"{base}/{os.path.basename(fname).replace(' ', '.')}" if fname else ""

          manifest = {
            "version":  version,
            "notes":    f"NodePulse Connect v{version}",
            "pub_date": "${PUB_DATE}",
            "platforms": {},
            "downloads": {}
          }

          updater_entries = [
            ("windows-x86_64", "${WIN_EXE}", "${WIN_SIG}"),
            ("darwin-aarch64", "${MAC_TAR}", "${MAC_SIG}"),
            ("linux-x86_64",   "${LNX_IMG}", "${LNX_SIG}"),
          ]
          for target, fpath, sig in updater_entries:
            if fpath and sig:
              manifest["platforms"][target] = {
                "url":       url(fpath),
                "signature": sig.strip()
              }

          download_entries = [
            ("windows-x86_64", "${WIN_EXE}"),
            ("darwin-aarch64", "${MAC_DMG}"),
            ("linux-x86_64",   "${LNX_IMG}"),
          ]
          for target, fpath in download_entries:
            if fpath:
              manifest["downloads"][target] = url(fpath)

          with open("latest.json", "w") as f:
            json.dump(manifest, f, indent=2)

          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          ASSETS=()
          while IFS= read -r f; do
            ASSETS+=("$f")
          done < <(find bundles -type f \( \
            -name "*.exe"         -o -name "*.exe.sig"         \
            -o -name "*.dmg"      \
            -o -name "*.tar.gz"   -o -name "*.tar.gz.sig"      \
            -o -name "*.AppImage" -o -name "*.AppImage.sig"     \
          \))

          gh release create "v${VERSION}" \
            --title "NodePulse Connect v${VERSION}" \
            --notes "NodePulse Connect v${VERSION}" \
            "${ASSETS[@]}" latest.json

      - name: Summary
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          echo "## NodePulse Connect v${VERSION} Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** https://github.com/aurigalugina/nodepulse-connect-releases/releases/tag/v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Update manifest:** https://github.com/aurigalugina/nodepulse-connect-releases/releases/latest/download/latest.json" >> $GITHUB_STEP_SUMMARY
